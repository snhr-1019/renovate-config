---
name: prek checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  prek:
    runs-on: ubuntu-slim
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run prek
        uses: j178/prek-action@v2
